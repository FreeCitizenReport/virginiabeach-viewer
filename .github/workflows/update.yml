name: Update VB Data

on:
  schedule:
    - cron: '*/6 * * * *'  # every 6 minutes
  workflow_dispatch:        # manual "Run workflow" button in GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json court_data.json
          git diff --staged --quiet || git commit -m "Update jail data [skip ci]"
          git push
